
<!DOCTYPE html>
<html>
  <head>
    <title>YouTube.com Clone</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
      p {
        font-family: Roboto, Arial;
        margin-top: 0;
        margin-bottom: 0;
      }

      .thumbnail {
        width: 300px;
        display: block;
      }

      .search-bar {
        display: block;
      }

      .video-title {
        margin-top: 0;
        font-size: 14px;
        font-weight: 500;
        line-height: 20px;
        margin-bottom: 12px;
      }

      .video-preview {
        width: 300px;
        display: inline-block;
        vertical-align: top;
        margin-right: 20px;
      }

      .channel-picture {
        display: inline-block;
        width: 50px;
        vertical-align: top;
      }

      .video-info {
        display: inline-block;
        width: 200px;
      }

      .profile-picture {
        width: 40px;
        border-radius: 50px;
      }

      .thumbnail-row {
        margin-bottom: 12px;
      }

      .video-author,
      .video-stats {
        font-size: 12px;
        color: rgb(96, 96, 96);
      }

      .video-author {
        margin-bottom: 4px;
      }
    </style>
  </head>
  <body>
    <input class="search-bar" type="text" placeholder="Search">

    <div class="video-preview">
      <div class="thumbnail-row">
        <img class="thumbnail" src="thumbnails/thumbnail.jpg">
      </div>
      <div>
        <div class="channel-picture">
          <img class="profile-picture" src="thumbnails/youtube1.jpg">
        </div>
        <div class="video-info">
          <p class="video-title">
             I Took All 7 Anthropic Courses in One Weekend (Honest Review)
          </p>
          <p class="video-author">
            Jas Wong
          </p>
          <p class="video-stats">
            240k views &#8226; 2 months ago
          </p>
        </div>
      </div>
    </div>

    <div class="video-preview">
      <div class="thumbnail-row">
        <img class="thumbnail" src="thumbnails/thumbnail.png">
      </div>
      <div>
        <div class="channel-picture">
          <img class="profile-picture" src="thumbnails/yutube1.jpg">
        </div>
        <div class="video-info">
          <p class="video-title">
            Web development course
          </p>
          <p class="video-author">
            Bro code
          </p>
          <p class="video-stats">
            2.5M views &#8226; 1 year ago
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
